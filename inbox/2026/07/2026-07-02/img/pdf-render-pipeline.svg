<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Markdown to PDF pipeline</title>
  <desc id="desc">A light diagram showing Markdown, HTML, CSS, Chromium and PDF output.</desc>
  <rect width="960" height="360" fill="#ffffff"/>
  <rect x="34" y="34" width="892" height="292" rx="28" fill="#f6f8fa" stroke="#d0d7de"/>
  <g font-family="Inter, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" text-anchor="middle">
    <rect x="76" y="126" width="136" height="84" rx="18" fill="#ffffff" stroke="#8c959f"/>
    <text x="144" y="160" fill="#24292f" font-weight="700">Markdown</text>
    <text x="144" y="190" fill="#57606a" font-size="15">md / img</text>

    <rect x="266" y="126" width="136" height="84" rx="18" fill="#ffffff" stroke="#8c959f"/>
    <text x="334" y="160" fill="#24292f" font-weight="700">HTML</text>
    <text x="334" y="190" fill="#57606a" font-size="15">renderer</text>

    <rect x="456" y="126" width="136" height="84" rx="18" fill="#ffffff" stroke="#8c959f"/>
    <text x="524" y="160" fill="#24292f" font-weight="700">CSS</text>
    <text x="524" y="190" fill="#57606a" font-size="15">theme</text>

    <rect x="646" y="126" width="136" height="84" rx="18" fill="#ffffff" stroke="#8c959f"/>
    <text x="714" y="160" fill="#24292f" font-weight="700">Chromium</text>
    <text x="714" y="190" fill="#57606a" font-size="15">print</text>

    <rect x="800" y="126" width="84" height="84" rx="18" fill="#ffffff" stroke="#8c959f"/>
    <text x="842" y="160" fill="#24292f" font-weight="700">PDF</text>
    <text x="842" y="190" fill="#57606a" font-size="15">A4</text>
  </g>
  <g stroke="#57606a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M220 168 H256"/>
    <path d="M248 160 L256 168 L248 176"/>
    <path d="M410 168 H446"/>
    <path d="M438 160 L446 168 L438 176"/>
    <path d="M600 168 H636"/>
    <path d="M628 160 L636 168 L628 176"/>
    <path d="M790 168 H792"/>
  </g>
  <text x="480" y="76" font-family="Inter, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle" fill="#24292f">Obsidian Style PDF Action</text>
  <text x="480" y="276" font-family="Inter, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#57606a">main 接收任务，output 保存产物，成功后清理队列内容</text>
</svg>
