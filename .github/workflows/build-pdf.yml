name: Build Obsidian Style PDF

on:
  push:
    paths:
      - '**/*.md'
      - 'style.css'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Record workflow run id
        run: |
          mkdir -p .github
          echo "${{ github.run_id }}" > .github/latest-run-id.txt
          echo "${{ github.run_attempt }}" > .github/latest-run-attempt.txt
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" > .github/latest-run-url.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/latest-run-id.txt .github/latest-run-attempt.txt .github/latest-run-url.txt
          if ! git diff --cached --quiet; then
            git commit -m "Record latest workflow run id [skip ci]"
            git push
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies, fonts, and Chrome
        run: |
          set -o pipefail
          : > .github/latest-build-log.txt
          echo "## apt install CJK fonts" | tee -a .github/latest-build-log.txt
          sudo apt-get update 2>&1 | tee -a .github/latest-build-log.txt
          sudo apt-get install -y fonts-noto-cjk 2>&1 | tee -a .github/latest-build-log.txt
          fc-cache -f 2>&1 | tee -a .github/latest-build-log.txt

          echo "" | tee -a .github/latest-build-log.txt
          echo "## npm install" | tee -a .github/latest-build-log.txt
          npm install 2>&1 | tee -a .github/latest-build-log.txt

          echo "" | tee -a .github/latest-build-log.txt
          echo "## Chrome setup" | tee -a .github/latest-build-log.txt
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -n "$CHROME_PATH" ]; then
            echo "Using system Chrome: $CHROME_PATH" | tee -a .github/latest-build-log.txt
            echo "PUPPETEER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
          else
            echo "System Chrome not found. Cleaning Puppeteer Chrome cache and installing pinned Chrome." | tee -a .github/latest-build-log.txt
            rm -rf ~/.cache/puppeteer/chrome
            npx puppeteer browsers install chrome --install-deps 2>&1 | tee -a .github/latest-build-log.txt
          fi

      - name: Build PDF
        run: |
          set -o pipefail
          echo "" | tee -a .github/latest-build-log.txt
          echo "## npm run build:pdf" | tee -a .github/latest-build-log.txt
          npm run build:pdf 2>&1 | tee -a .github/latest-build-log.txt

      - name: Commit latest build log
        if: always()
        run: |
          git add .github/latest-build-log.txt
          if ! git diff --cached --quiet; then
            git commit -m "Record latest build log [skip ci]"
            git push
          fi

      - name: Upload PDF artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: obsidian-style-pdf
          path: |
            dist/notes.pdf
            dist/notes.html
