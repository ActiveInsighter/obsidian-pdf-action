name: Build Obsidian Style PDF

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - 'style.css'
      - 'themes/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Record run start
        run: node scripts/record-run-state.mjs start

      - name: Commit run start
        run: node scripts/git-commit-state.mjs "Record workflow start [skip ci]"

      - name: Install dependencies, fonts, and Chrome
        run: |
          set -o pipefail
          mkdir -p .github
          : > .github/latest-build-log.txt
          echo "## apt install CJK fonts" | tee -a .github/latest-build-log.txt
          sudo apt-get update 2>&1 | tee -a .github/latest-build-log.txt
          sudo apt-get install -y fonts-noto-cjk 2>&1 | tee -a .github/latest-build-log.txt
          fc-cache -f 2>&1 | tee -a .github/latest-build-log.txt
          echo "" | tee -a .github/latest-build-log.txt
          echo "## npm install" | tee -a .github/latest-build-log.txt
          npm install 2>&1 | tee -a .github/latest-build-log.txt
          echo "" | tee -a .github/latest-build-log.txt
          echo "## Chrome setup" | tee -a .github/latest-build-log.txt
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -n "$CHROME_PATH" ]; then
            echo "Using system Chrome: $CHROME_PATH" | tee -a .github/latest-build-log.txt
            echo "PUPPETEER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
          else
            echo "System Chrome not found. Cleaning Puppeteer Chrome cache and installing pinned Chrome." | tee -a .github/latest-build-log.txt
            rm -rf ~/.cache/puppeteer/chrome
            npx puppeteer browsers install chrome --install-deps 2>&1 | tee -a .github/latest-build-log.txt
          fi

      - name: Build PDF
        id: build_pdf
        continue-on-error: true
        run: npm run ci:build

      - name: Upload PDF artifact
        id: upload_artifact
        if: steps.build_pdf.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: obsidian-style-pdf
          path: |
            dist/notes.pdf
            dist/notes.html
            .github/latest-build-log.txt

      - name: Record run finish
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build_pdf.outcome }}
          ARTIFACT_OUTCOME: ${{ steps.upload_artifact.outcome }}
        run: node scripts/record-run-state.mjs finish

      - name: Commit run finish
        if: always()
        continue-on-error: true
        run: node scripts/git-commit-state.mjs "Record workflow finish [skip ci]"

      - name: Fail if build failed
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build_pdf.outcome }}
          ARTIFACT_OUTCOME: ${{ steps.upload_artifact.outcome }}
        run: node -e "process.exit(process.env.BUILD_OUTCOME === 'success' && process.env.ARTIFACT_OUTCOME === 'success' ? 0 : 1)"
